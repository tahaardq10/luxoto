<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>luxOTO</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<header>
<div class="logo">luxOTO</div>
<div>
<button class="btn btn-yellow" onclick="openModal('login')">Giriş</button>
<button class="btn btn-orange" onclick="openModal('add')">İlan Ver</button>
</div>
</header>

<div class="main">
<div>
<input type="text" placeholder="Ara..." onkeyup="searchAds(this.value)">
<div id="ads"></div>
</div>
</div>

<!-- LOGIN -->
<div class="modal" id="login">
<div class="modal-box">
<h3>Giriş</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Şifre">
<button class="btn btn-orange" onclick="login()">Giriş</button>
</div>
</div>

<!-- ADD -->
<div class="modal" id="add">
<div class="modal-box">
<h3>İlan Ver</h3>
<input id="marka" placeholder="Marka">
<input id="model" placeholder="Model">
<button class="btn btn-orange" onclick="addAd()">Paylaş</button>
</div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
